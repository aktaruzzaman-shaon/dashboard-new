<div class="relative inline-block">
  <button #triggerButton (click)="togglePopup($event)" ...>
    <ng-content select="[svg-icon]"></ng-content>
    <!-- Badge (optional) -->
    @if (badgeDisplay(); as display) {
      <span
        class="absolute -top-1 -right-1 bg-sky-500 text-white text-xs font-bold rounded-full h-3 w-3 flex items-center justify-center"
      >
        {{ display }}
      </span>
    }
  </button>

  @if (isOpen()) {
    <div class="fixed inset-0 bg-black/10 z-40" (click)="closePopup()"></div>

    <div
      #popupModal
      class="fixed z-50 bg-white rounded-xl shadow-2xl"
      [style.top.px]="popupTop"
      [style.left.px]="popupLeft"
      (click)="$event.stopPropagation()"
    >
      <div class="p-1">
        <ng-content></ng-content>
      </div>
    </div>
  }
</div>
