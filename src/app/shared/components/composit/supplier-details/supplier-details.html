<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
  <div class="w-full max-w-5xl overflow-hidden rounded-2xl bg-white shadow-xl">
    <div class="relative p-6 pb-2">
      <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold text-gray-800">Supplier Details</h2>
        <button
          (click)="onClose()"
          class="rounded-full p-1 text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <div class="mt-4 flex flex-wrap gap-x-8 gap-y-2 text-sm">
        <p class="text-gray-600">
          <span class="font-semibold text-gray-800">Reference Number:</span> {{ referenceNumber() }}
        </p>
        <p class="text-gray-600">
          <span class="font-semibold text-gray-800">Option Name:</span> {{ optionName() }}
        </p>
      </div>
    </div>

    <div class="mt-6 overflow-x-auto p-6 pt-0">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-gray-100 text-sm font-semibold text-gray-700">
            <th class="pb-4 pr-4">Supplier Name</th>
            <th class="pb-4 pr-4">Service</th>
            <th class="pb-4 pr-4">Phone Number</th>
            <th class="pb-4 pr-4">WhatsApp Number</th>
            <th class="pb-4">Email Address</th>
          </tr>
        </thead>
        <tbody class="text-sm text-gray-600">
          <tr>
            <td class="py-4 pr-4">{{ supplier().name }}</td>
            <td class="py-4 pr-4">{{ supplier().service }}</td>
            <td class="py-4 pr-4">{{ supplier().phone }}</td>
            <td class="py-4 pr-4">{{ supplier().whatsapp }}</td>
            <td class="py-4 text-blue-600 hover:underline cursor-pointer">
              {{ supplier().email }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
